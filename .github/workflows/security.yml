name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  # -------------------------------
  # Static Application Security Testing (SAST)
  # -------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  # -------------------------------
  # Secret Detection
  # -------------------------------
  gitleaks:
    name: Gitleaks Secret Scanning
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # -------------------------------
  # Dependency Vulnerability Scanning
  # -------------------------------
  npm-audit:
    name: NPM Audit Security Check
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        working-directory:
          - 'apps/services/globalix-group-backend'
          - 'apps/services/admin-backend'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.working-directory }}
        run: npm audit --audit-level=moderate || true

      - name: Generate npm audit report
        if: always()
        working-directory: ${{ matrix.working-directory }}
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report-${{ matrix.working-directory }}
          path: ${{ matrix.working-directory }}/npm-audit-report.json

  # -------------------------------
  # Container Image Scanning
  # -------------------------------
  trivy-scan:
    name: Trivy Container Scanning
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        dockerfile:
          - path: 'apps/services/globalix-group-backend/Dockerfile'
            name: 'globalix-group-backend'
          - path: 'apps/services/admin-backend/Dockerfile'
            name: 'admin-backend'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f ${{ matrix.dockerfile.path }} -t ${{ matrix.dockerfile.name }}:latest .

      - name: Run Trivy (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.dockerfile.name }}:latest'
          format: 'sarif'
          output: '${{ matrix.dockerfile.name }}-trivy.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: '${{ matrix.dockerfile.name }}-trivy.sarif'
          category: 'trivy-${{ matrix.dockerfile.name }}'

  # -------------------------------
  # TypeScript Type Checking
  # -------------------------------
  type-check:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working-directory:
          - 'apps/services/globalix-group-backend'
          - 'apps/services/admin-backend'
          - 'apps/mobile/globalix-group-app'
          - 'apps/web/admin-dashboard'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Run TypeScript compiler
        working-directory: ${{ matrix.working-directory }}
        run: npx tsc --noEmit

  # -------------------------------
  # Best Practices / Policy Checks
  # -------------------------------
  security-headers:
    name: Security Best Practices Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          grep -r "password\s*=\s*['\"]" . --include="*.ts" --include="*.js" \
          --exclude-dir=node_modules || true

  # -------------------------------
  # NON-BLOCKING SUMMARY (OPTION B)
  # -------------------------------
  security-summary:
    name: Security Check Summary
    runs-on: ubuntu-latest
    needs:
      - codeql
      - gitleaks
      - npm-audit
      - trivy-scan
      - type-check
      - security-headers
    if: always()
    steps:
      - name: Create security report summary
        run: |
          echo "## 🛡️ Security Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL: ${{ needs.codeql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Gitleaks: ${{ needs.gitleaks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- NPM Audit: ${{ needs.npm-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy Scan: ${{ needs.trivy-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript: ${{ needs.type-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Headers: ${{ needs.security-headers.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ This summary is informational and non-blocking." >> $GITHUB_STEP_SUMMARY
